services:
  backend:
    build: ./backend
    ports:
      - "9090:9090"
    environment:
      JAVA_OPTS: "-XX:+UseContainerSupport"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:9090
    ports:
      - "8080:80"
    depends_on:
      - backend
